<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🌟 Fun Time Quiz! 🌟</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Comic Neue', cursive;
      background: linear-gradient(to right, #fceabb, #f8b500);
      text-align: center;
      padding: 20px;
      color: #333;
      margin: 0;
    }

    h2 {
      font-size: 2.5em;
      color: #ff3366;
      margin-bottom: 10px;
      text-shadow: 1px 1px #fff;
    }

    #timer {
      font-size: 2em;
      font-weight: bold;
      color: #0077cc;
      background-color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
      display: inline-block;
      margin-bottom: 20px;
    }

    .instructions {
      background-color: #fff8dc;
      border: 2px dashed #ffa500;
      padding: 15px;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 800px;
      font-size: 1.1em;
    }

    .star {
      font-size: 1.2em;
      color: #ff3366;
    }

    iframe {
      border: 5px solid #ffcc00;
      border-radius: 20px;
      box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
      width: 100%;
      height: 600px;
      max-width: 100%;
    }

    @media (max-width: 768px) {
      h2 {
        font-size: 1.8em;
      }
      #timer {
        font-size: 1.5em;
        padding: 8px 16px;
      }
      .instructions {
        font-size: 1em;
        padding: 10px;
      }
      iframe {
        height: 500px;
      }
    }

    @media (max-width: 480px) {
      h2 {
        font-size: 1.5em;
      }
      #timer {
        font-size: 1.2em;
        padding: 6px 12px;
      }
      .star {
        font-size: 1em;
      }
      iframe {
        height: 400px;
      }
    }
  </style>
  <script>
    let timeLeft = 3600; // 60 minutes
    function startTimer() {
      const timerDisplay = document.getElementById('timer');
      const interval = setInterval(() => {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        timerDisplay.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        timeLeft--;
        if (timeLeft < 0) {
          clearInterval(interval);
          alert("⏰ Time's up! Closing the quiz now.");
          try {
            document.getElementById("quizFrame").contentWindow.document.forms[0].submit();
          } catch (e) {
            console.warn("Auto-submit failed or form not accessible.");
          }

          // Attempt to close the window
          window.close();

          // If not allowed to close, redirect as fallback
          setTimeout(() => {
            window.location.href = "https://example.com/times-up"; // Replace with your custom page
          }, 1000);
        }
      }, 1000);
    }
    window.onload = startTimer;
  </script>
</head>
<body>
  <h2>🎉 Welcome to the Fun Time Quiz! 🎉</h2>
  <p id="timer">60:00</p> <!-- Updated initial timer display -->

  <div class="instructions">
    <p class="star">⭐ Answer all the questions carefully.</p>
    <p class="star">⭐ You have <strong>60 minutes</strong> to finish the quiz.</p>
    <p class="star">⭐ Time will start as soon as the page loads!</p>
    <p class="star">⭐ Have fun and do your best!</p>
  </div>

  <iframe id="quizFrame" src="https://forms.gle/9r7mvnm1V7mKVfNC9" allowfullscreen></iframe>
</body>
</html>
